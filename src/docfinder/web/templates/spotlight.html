<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocFinder Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
      font-size: 14px;
      background: #0a0a0f;
    }

    .window {
      height: 100vh;
      background: rgba(18, 18, 26, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 255, 255, 0.06);
      animation: spotlightIn 0.15s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes spotlightIn {
      from { opacity: 0; transform: scale(0.98) translateY(-8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Search bar ─────────────────────────────────────────────────────── */
    .search-bar {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 56px;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
      -webkit-app-region: drag;
      border-radius: 14px 14px 0 0;
    }

    #spotlight-input, .spinner-sm { -webkit-app-region: no-drag; }

    .search-icon { color: #6b7280; flex-shrink: 0; }

    #spotlight-input {
      flex: 1;
      background: rgba(129, 140, 248, 0.08);
      border: 1px solid rgba(129, 140, 248, 0.18);
      border-radius: 10px;
      padding: 0.45rem 0.65rem;
      outline: none;
      font-size: 1.05rem;
      font-weight: 400;
      color: #f3f4f6;
      caret-color: #818cf8;
      font-family: inherit;
    }

    #spotlight-input:focus {
      border-color: rgba(129, 140, 248, 0.45);
      box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.14);
    }

    #spotlight-input::placeholder { color: #6b7280; }

    .spinner-sm {
      width: 14px; height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.06);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
      display: none;
    }
    .spinner-sm.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ────────────────────────────────────────────────────────── */
    #results {
      overflow-y: auto;
      flex: 1;
      padding: 4px;
    }

    #results::-webkit-scrollbar { width: 4px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: #6b7280; border-radius: 2px; opacity: 0.3; }

    .result-item {
      display: flex;
      flex-direction: column;
      padding: 8px 12px;
      cursor: pointer;
      gap: 2px;
      transition: background 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px;
      margin: 1px 0;
    }

    .result-item.active,
    .result-item:hover {
      background: rgba(129, 140, 248, 0.12);
    }

    .result-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: #f3f4f6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-snippet {
      font-size: 0.75rem;
      color: #9ca3af;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }

    .result-type {
      font-size: 0.65rem;
      padding: 1px 5px;
      border-radius: 3px;
      background: #22222f;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .result-path {
      font-size: 0.68rem;
      color: #6b7280;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .result-score {
      font-size: 0.65rem;
      color: #818cf8;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      opacity: 0.7;
    }

    .empty {
      padding: 24px 16px;
      text-align: center;
      color: #6b7280;
      font-size: 0.85rem;
    }

    /* ── Hint bar ───────────────────────────────────────────────────────── */
    .hint-bar {
      display: flex;
      justify-content: space-between;
      padding: 6px 16px;
      font-size: 0.68rem;
      color: #6b7280;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    kbd {
      background: #22222f;
      border-radius: 3px;
      padding: 1px 4px;
      font-family: inherit;
      font-size: 0.65rem;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="search-bar">
      <span class="search-icon">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.7"/>
          <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </span>
      <input
        id="spotlight-input"
        type="text"
        placeholder="Search your documents… (min 2 chars)"
        autocomplete="off"
        spellcheck="false"
        autofocus
      />
      <div id="spinner" class="spinner-sm"></div>
    </div>

    <div id="results"></div>

    <div class="hint-bar">
      <span><kbd>&uarr;&darr;</kbd> navigate &middot; <kbd>&crarr;</kbd> open &middot; <kbd>Esc</kbd> close</span>
      <span>DocFinder</span>
    </div>
  </div>

  <script>
    const apiBase = window.location.origin;
    const input   = document.getElementById('spotlight-input');
    const results = document.getElementById('results');
    const spinner = document.getElementById('spinner');

    let activeIndex    = -1;
    let currentResults = [];
    let debounceTimer  = null;

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function fileExt(path) {
      const m = String(path).match(/\.([^.]+)$/);
      return m ? m[1].toLowerCase() : '';
    }

    function shortPath(path) {
      const parts = String(path).split(/[/\\]/);
      return parts.slice(-3).join('/');
    }

    function renderResults(items) {
      currentResults = items;
      activeIndex    = -1;

      if (!items.length) {
        results.innerHTML = '<div class="empty">No results found</div>';
        return;
      }

      results.innerHTML = items.map((r, i) => `
        <div class="result-item" data-index="${i}" data-path="${escHtml(r.path)}">
          <div class="result-title">${escHtml(r.title || fileExt(r.path).toUpperCase() + ' document')}</div>
          <div class="result-snippet">${escHtml(r.text)}</div>
          <div class="result-meta">
            <span class="result-type">${escHtml(fileExt(r.path) || 'doc')}</span>
            <span class="result-path" title="${escHtml(r.path)}">${escHtml(shortPath(r.path))}</span>
            <span class="result-score">${Math.round(r.score * 100)}%</span>
          </div>
        </div>
      `).join('');

      results.querySelectorAll('.result-item').forEach(el => {
        el.addEventListener('click',      () => openResult(el.dataset.path));
        el.addEventListener('mouseenter', () => setActive(parseInt(el.dataset.index)));
      });
    }

    function setActive(idx) {
      activeIndex = Math.max(0, Math.min(idx, currentResults.length - 1));
      results.querySelectorAll('.result-item').forEach((el, i) => {
        el.classList.toggle('active', i === activeIndex);
      });
    }

    async function openResult(path) {
      try {
        await fetch(`${apiBase}/open`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path }),
        });
      } catch (_) {}
      hideSpotlight();
    }

    function hideSpotlight() {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.spotlight) {
        window.webkit.messageHandlers.spotlight.postMessage({ action: 'hide' });
      } else if (window.pywebview) {
        window.pywebview.api.hide_spotlight();
      } else {
        fetch(apiBase + '/gui/spotlight/hide', { method: 'POST' }).catch(() => {});
      }
    }

    async function doSearch(query) {
      const trimmed = query.trim();
      if (trimmed.length < 2) {
        results.innerHTML = '';
        currentResults = [];
        return;
      }
      spinner.classList.add('active');
      try {
        const res  = await fetch(`${apiBase}/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: trimmed, top_k: 10 }),
        });
        const data = await res.json();
        if (res.ok) {
          const scored = data.results || [];
          const relevant = scored.filter(r => r.score >= 0.2);
          renderResults(relevant.length ? relevant : scored);
        } else {
          results.innerHTML = `<div class="empty">${escHtml(data.detail || 'Error')}</div>`;
        }
      } catch (_) {
        results.innerHTML = '<div class="empty">Search unavailable \u2014 is DocFinder indexed?</div>';
      } finally {
        spinner.classList.remove('active');
      }
    }

    // Debounced search
    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const q = input.value.trim();
      if (q.length < 2) { results.innerHTML = ''; currentResults = []; return; }
      debounceTimer = setTimeout(() => doSearch(input.value), 500);
    });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { hideSpotlight(); return; }

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActive(activeIndex + 1);
        results.querySelectorAll('.result-item')[activeIndex]
          ?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActive(activeIndex - 1);
        results.querySelectorAll('.result-item')[activeIndex]
          ?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        if (activeIndex >= 0 && currentResults[activeIndex]) {
          openResult(currentResults[activeIndex].path);
        }
      }
    });

    // Hide on focus loss (clicking another app)
    window.addEventListener('blur', () => {
      setTimeout(() => { if (!document.hasFocus()) hideSpotlight(); }, 150);
    });

    // Auto-focus search on load and whenever the window regains focus
    window.addEventListener('load', () => input.focus());
    window.addEventListener('focus', () => {
      setTimeout(() => input.focus(), 30);
    });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) setTimeout(() => input.focus(), 30);
    });
  </script>
</body>
</html>

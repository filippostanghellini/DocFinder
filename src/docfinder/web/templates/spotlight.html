<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocFinder Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      /* Match the NSPanel/WKWebView background so no white edges appear
         when the window uses a solid (non-transparent) background. */
      background: rgb(22, 27, 42);
    }

    .window {
      height: 100vh;
      background: rgba(22, 27, 42, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 4px 16px rgba(0,0,0,0.4);
    }

    /* ── Search bar ─────────────────────────────────────────────────────── */
    .search-bar {
      display: flex;
      align-items: center;
      padding: 0 18px;
      height: 68px;
      gap: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      flex-shrink: 0;
      /* Allow dragging the frameless window by its header on Windows/Linux */
      -webkit-app-region: drag;
    }

    /* Input and interactive elements must opt out of drag */
    #spotlight-input, .spinner-sm { -webkit-app-region: no-drag; }

    .search-icon { color: rgba(255,255,255,0.35); flex-shrink: 0; }

    #spotlight-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 1.3rem;
      font-weight: 400;
      color: rgba(255,255,255,0.92);
      caret-color: #60a5fa;
      letter-spacing: 0.01em;
    }

    #spotlight-input::placeholder { color: rgba(255,255,255,0.25); }

    .spinner-sm {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
      display: none;
    }
    .spinner-sm.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ────────────────────────────────────────────────────────── */
    #results {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    #results::-webkit-scrollbar { width: 4px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .result-item {
      display: flex;
      flex-direction: column;
      padding: 10px 18px;
      cursor: pointer;
      gap: 3px;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }

    .result-item.active,
    .result-item:hover {
      background: rgba(96, 165, 250, 0.12);
      border-left-color: #60a5fa;
    }

    .result-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-snippet {
      font-size: 0.77rem;
      color: rgba(255,255,255,0.38);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 1px;
    }

    .result-path {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.22);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .result-score {
      font-size: 0.68rem;
      color: rgba(96,165,250,0.6);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .result-type {
      font-size: 0.66rem;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .empty {
      padding: 28px 20px;
      text-align: center;
      color: rgba(255,255,255,0.22);
      font-size: 0.88rem;
    }

    /* ── Hint bar ───────────────────────────────────────────────────────── */
    .hint-bar {
      display: flex;
      justify-content: space-between;
      padding: 7px 18px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.18);
      border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    kbd {
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 0.68rem;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="search-bar">
      <span class="search-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.7"/>
          <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </span>
      <input
        id="spotlight-input"
        type="text"
        placeholder="Search your documents…"
        autocomplete="off"
        spellcheck="false"
        autofocus
      />
      <div id="spinner" class="spinner-sm"></div>
    </div>

    <div id="results"></div>

    <div class="hint-bar">
      <span><kbd>↑↓</kbd> navigate · <kbd>↵</kbd> open · <kbd>Esc</kbd> close</span>
      <span>DocFinder</span>
    </div>
  </div>

  <script>
    const apiBase = window.location.origin;
    const input   = document.getElementById('spotlight-input');
    const results = document.getElementById('results');
    const spinner = document.getElementById('spinner');

    let activeIndex    = -1;
    let currentResults = [];
    let debounceTimer  = null;

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function fileExt(path) {
      const m = String(path).match(/\.([^.]+)$/);
      return m ? m[1].toLowerCase() : '';
    }

    function shortPath(path) {
      const parts = String(path).split(/[/\\]/);
      return parts.slice(-3).join('/');
    }

    function renderResults(items) {
      currentResults = items;
      activeIndex    = -1;

      if (!items.length) {
        results.innerHTML = '<div class="empty">No results found</div>';
        return;
      }

      results.innerHTML = items.map((r, i) => `
        <div class="result-item" data-index="${i}" data-path="${escHtml(r.path)}">
          <div class="result-title">${escHtml(r.title || fileExt(r.path).toUpperCase() + ' document')}</div>
          <div class="result-snippet">${escHtml(r.text)}</div>
          <div class="result-meta">
            <span class="result-type">${escHtml(fileExt(r.path) || 'doc')}</span>
            <span class="result-path" title="${escHtml(r.path)}">${escHtml(shortPath(r.path))}</span>
            <span class="result-score">${Math.round(r.score * 100)}%</span>
          </div>
        </div>
      `).join('');

      results.querySelectorAll('.result-item').forEach(el => {
        el.addEventListener('click',      () => openResult(el.dataset.path));
        el.addEventListener('mouseenter', () => setActive(parseInt(el.dataset.index)));
      });
    }

    function setActive(idx) {
      activeIndex = Math.max(0, Math.min(idx, currentResults.length - 1));
      results.querySelectorAll('.result-item').forEach((el, i) => {
        el.classList.toggle('active', i === activeIndex);
      });
    }

    async function openResult(path) {
      try {
        await fetch(`${apiBase}/open`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path }),
        });
      } catch (_) {}
      hideSpotlight();
    }

    function hideSpotlight() {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.spotlight) {
        // Native NSPanel via WKScriptMessageHandler
        window.webkit.messageHandlers.spotlight.postMessage({ action: 'hide' });
      } else if (window.pywebview) {
        // pywebview fallback (non-macOS or legacy builds)
        window.pywebview.api.hide_spotlight();
      } else {
        // HTTP fallback: native WKWebView (SpotlightPanel) without message handler
        fetch(apiBase + '/gui/spotlight/hide', { method: 'POST' }).catch(() => {});
      }
    }

    async function doSearch(query) {
      if (!query.trim()) {
        results.innerHTML = '';
        currentResults = [];
        return;
      }
      spinner.classList.add('active');
      try {
        const res  = await fetch(`${apiBase}/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: query.trim(), top_k: 8 }),
        });
        const data = await res.json();
        if (res.ok) renderResults(data.results || []);
        else results.innerHTML = `<div class="empty">${escHtml(data.detail || 'Error')}</div>`;
      } catch (_) {
        results.innerHTML = '<div class="empty">Search unavailable — is DocFinder indexed?</div>';
      } finally {
        spinner.classList.remove('active');
      }
    }

    // Debounced search
    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => doSearch(input.value), 300);
    });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { hideSpotlight(); return; }

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActive(activeIndex + 1);
        results.querySelectorAll('.result-item')[activeIndex]
          ?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActive(activeIndex - 1);
        results.querySelectorAll('.result-item')[activeIndex]
          ?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        if (activeIndex >= 0 && currentResults[activeIndex]) {
          openResult(currentResults[activeIndex].path);
        }
      }
    });

    // Hide on focus loss (clicking another app)
    window.addEventListener('blur', () => {
      setTimeout(() => { if (!document.hasFocus()) hideSpotlight(); }, 150);
    });

    // Auto-focus search on load and whenever the window regains focus
    window.addEventListener('load', () => input.focus());
    window.addEventListener('focus', () => {
      setTimeout(() => input.focus(), 30);
    });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) setTimeout(() => input.focus(), 30);
    });
  </script>
</body>
</html>
